services: 
  triton-server: 
    image: triton-pytorch-cuda-128:v1

    build: 
      context: . 
      dockerfile: Dockerfile 
    container_name: triton-infer-test
    shm_size: '4gb' 
    
    # 2. Mở cổng để máy ngoài hoặc ứng dụng khác có thể gọi API đến Triton
    ports:
      - "8000:8000" # HTTP REST API
      - "8001:8001" # gRPC API
      - "8002:8002" # Metrics

    # 3. Mount thư mục (Nên chỉ rõ ràng thư mục chứa mô hình và log)
    volumes: 
      - ./:/app
      # Đảm bảo bạn có tạo sẵn thư mục logs ở máy thật để lưu log
      - ./logs:/logs 
    
    # 4. Câu lệnh khởi chạy Triton Server nội bộ
    command: > 
      bash -c "tritonserver --model-repository=/app/models --model-repository=/app/models_face_optimizer --log-verbose=0 --log-file=/logs/server.log" 
    
    # 5. Kiểm tra trạng thái sống/chết của Server
    healthcheck: 
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"] 
      interval: 30s 
      timeout: 10s 
      retries: 10 
      start_period: 30s 
      
    # 6. Kích hoạt GPU cho Docker Compose
    deploy: 
      resources: 
        reservations: 
          devices: 
            - driver: nvidia 
              count: 1 
              capabilities: [gpu] 
